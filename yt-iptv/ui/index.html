<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yt-iptv — Channel Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ── Reset & base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0b0d11;
    --surface:   #12151c;
    --surface2:  #1a1e28;
    --border:    #232736;
    --border2:   #2e3448;
    --accent:    #4f8ef7;
    --accent2:   #7ab3ff;
    --accent-dim:#1e3260;
    --red:       #f74f6a;
    --red-dim:   #3d1520;
    --green:     #4ff79e;
    --green-dim: #0d3322;
    --yellow:    #f7c44f;
    --text:      #d4daf0;
    --text2:     #7a85a8;
    --text3:     #3d4560;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  html { font-size: 14px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  /* ── Scanline overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2rem;
    height: 56px;
    background: var(--surface);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-family: var(--sans);
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: -0.02em;
    color: var(--text);
    text-decoration: none;
  }

  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: grid;
    place-items: center;
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  .logo span { color: var(--accent); }

  .header-status {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    font-size: 0.75rem;
    color: var(--text2);
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s ease-in-out infinite;
    display: inline-block;
    margin-right: 0.4rem;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .jellyfin-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 0.75rem;
    padding: 0.3rem 0.75rem;
    border: 1px solid var(--accent-dim);
    border-radius: 4px;
    transition: all 0.15s;
  }
  .jellyfin-link:hover {
    background: var(--accent-dim);
    border-color: var(--accent);
  }

  /* ── Main layout ── */
  main {
    display: grid;
    grid-template-columns: 420px 1fr;
    min-height: 0;
  }

  /* ── Left panel (add channel) ── */
  .panel-add {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
  }

  .panel-title {
    padding: 1.25rem 1.5rem 1rem;
    font-family: var(--sans);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
  }

  .form-wrap {
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    flex: 1;
  }

  label {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    font-size: 0.7rem;
    color: var(--text2);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  input, select {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.85rem;
    padding: 0.65rem 0.85rem;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    width: 100%;
  }
  input::placeholder { color: var(--text3); }
  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
  }
  input.error { border-color: var(--red); }

  .url-row {
    display: flex;
    gap: 0.5rem;
  }
  .url-row input { flex: 1; }

  /* Preview card */
  .preview-card {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
    overflow: hidden;
    display: none;
    animation: slideIn 0.2s ease;
  }
  .preview-card.visible { display: block; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .preview-thumb {
    width: 100%;
    height: 130px;
    object-fit: cover;
    display: block;
    background: var(--surface2);
  }
  .preview-thumb-placeholder {
    width: 100%; height: 130px;
    background: var(--surface2);
    display: grid;
    place-items: center;
    color: var(--text3);
    font-size: 1.5rem;
  }
  .preview-info {
    padding: 0.75rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .preview-title {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .preview-meta {
    font-size: 0.7rem;
    color: var(--text2);
    display: flex;
    gap: 0.75rem;
    align-items: center;
  }
  .badge {
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .badge-live { background: var(--red-dim); color: var(--red); }
  .badge-vod  { background: var(--accent-dim); color: var(--accent2); }
  .badge-playlist { background: var(--green-dim); color: var(--green); }

  /* Buttons */
  .btn {
    padding: 0.65rem 1.1rem;
    border-radius: 6px;
    border: none;
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    white-space: nowrap;
  }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text2);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    width: 100%;
    justify-content: center;
    font-size: 0.85rem;
  }
  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-danger {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text3);
    padding: 0.4rem 0.55rem;
  }
  .btn-danger:hover { color: var(--red); border-color: var(--red-dim); background: var(--red-dim); }

  .form-error {
    font-size: 0.75rem;
    color: var(--red);
    min-height: 1rem;
    display: none;
  }
  .form-error.visible { display: block; }

  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Right panel (channel list) ── */
  .panel-list {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .list-header {
    padding: 1.25rem 1.5rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .list-header-left {
    font-family: var(--sans);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .channel-count {
    background: var(--accent-dim);
    color: var(--accent);
    border-radius: 12px;
    padding: 0.1rem 0.55rem;
    font-size: 0.7rem;
    font-weight: 600;
  }

  .channel-list {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .channel-list::-webkit-scrollbar { width: 4px; }
  .channel-list::-webkit-scrollbar-track { background: transparent; }
  .channel-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Channel card */
  .channel-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.75rem 1rem;
    transition: border-color 0.15s;
    animation: cardIn 0.2s ease;
  }
  .channel-card:hover { border-color: var(--border2); }
  @keyframes cardIn {
    from { opacity: 0; transform: translateX(10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .card-thumb {
    width: 72px; height: 48px;
    border-radius: 4px;
    object-fit: cover;
    background: var(--surface2);
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .card-thumb-placeholder {
    width: 72px; height: 48px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: grid;
    place-items: center;
    color: var(--text3);
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .card-info { flex: 1; min-width: 0; }

  .card-name {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-meta {
    margin-top: 0.25rem;
    display: flex;
    gap: 0.6rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .card-group {
    font-size: 0.68rem;
    color: var(--text2);
  }

  .epg-status {
    font-size: 0.68rem;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .epg-loaded { color: var(--green); }
  .epg-loading { color: var(--yellow); }

  .card-epg-title {
    font-size: 0.72rem;
    color: var(--text2);
    margin-top: 0.2rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-actions {
    display: flex;
    gap: 0.25rem;
    flex-shrink: 0;
  }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: grid;
    place-items: center;
    color: var(--text3);
    text-align: center;
    gap: 0.5rem;
    padding: 3rem;
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .empty-text { font-size: 0.85rem; }
  .empty-sub  { font-size: 0.75rem; color: var(--text3); }

  /* Loading skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s ease-in-out infinite;
    border-radius: 4px;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    padding: 0.75rem 1.1rem;
    border-radius: 8px;
    font-size: 0.8rem;
    font-family: var(--mono);
    border: 1px solid transparent;
    max-width: 320px;
    z-index: 1000;
    transform: translateY(10px);
    opacity: 0;
    transition: all 0.2s ease;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.success { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  #toast.error   { background: var(--red-dim);   border-color: var(--red);   color: var(--red); }

  /* Confirm overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: grid;
    place-items: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    backdrop-filter: blur(4px);
  }
  .overlay.visible { opacity: 1; pointer-events: all; }
  .dialog {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 1.75rem;
    max-width: 360px;
    width: 90%;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    transform: scale(0.95);
    transition: transform 0.15s;
  }
  .overlay.visible .dialog { transform: scale(1); }
  .dialog h3 { font-family: var(--sans); font-size: 1rem; font-weight: 700; }
  .dialog p  { font-size: 0.8rem; color: var(--text2); line-height: 1.5; }
  .dialog-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }

  /* Responsive */
  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .panel-add { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <div class="logo-icon">▶</div>
    yt<span>-iptv</span>
  </a>
  <div class="header-status">
    <span id="server-status"><span class="status-dot"></span>proxy online</span>
    <span id="channel-count-header"></span>
    <a class="jellyfin-link" id="jellyfin-link" href="#" target="_blank">Open Jellyfin ↗</a>
  </div>
</header>

<main>
  <!-- ── Add channel panel ── -->
  <aside class="panel-add">
    <div class="panel-title">Add Channel</div>
    <div class="form-wrap">

      <label>
        YouTube URL
        <div class="url-row">
          <input type="url" id="url-input" placeholder="https://youtube.com/watch?v=…" autocomplete="off" spellcheck="false">
          <button class="btn btn-ghost" id="preview-btn" title="Fetch preview">⟳</button>
        </div>
      </label>

      <div class="preview-card" id="preview-card">
        <div class="preview-thumb-placeholder" id="preview-placeholder">▶</div>
        <img class="preview-thumb" id="preview-thumb" src="" alt="" style="display:none">
        <div class="preview-info">
          <div class="preview-title" id="preview-title">—</div>
          <div class="preview-meta">
            <span id="preview-badge" class="badge">—</span>
            <span id="preview-duration" style="color:var(--text2);font-size:0.7rem"></span>
          </div>
        </div>
      </div>

      <label>
        Channel Name
        <input type="text" id="name-input" placeholder="Auto-filled from YouTube…">
      </label>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
        <label>
          Group
          <input type="text" id="group-input" placeholder="e.g. Music">
        </label>
        <label>
          Type
          <select id="type-select">
            <option value="auto">Auto-detect</option>
            <option value="single">Single / Live</option>
            <option value="playlist">Playlist</option>
          </select>
        </label>
      </div>

      <div class="form-error" id="form-error"></div>

      <button class="btn btn-primary" id="add-btn" disabled>
        + Add to Jellyfin
      </button>

      <div style="margin-top:auto;padding-top:1rem;border-top:1px solid var(--border)">
        <div style="font-size:0.7rem;color:var(--text3);line-height:1.7">
          <div>📺 <b style="color:var(--text2)">M3U:</b> <a id="m3u-link" href="/playlist.m3u" style="color:var(--accent);text-decoration:none">/playlist.m3u</a></div>
          <div>📋 <b style="color:var(--text2)">EPG:</b> <a id="epg-link" href="/epg.xml" style="color:var(--accent);text-decoration:none">/epg.xml</a></div>
          <div style="margin-top:0.5rem">Changes apply immediately — Jellyfin picks them up on next guide refresh.</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ── Channel list panel ── -->
  <section class="panel-list">
    <div class="list-header">
      <div class="list-header-left">
        Channels
        <span class="channel-count" id="count-badge">0</span>
      </div>
      <button class="btn btn-ghost" id="refresh-epg-btn" style="font-size:0.72rem">↻ Refresh EPG</button>
    </div>
    <div class="channel-list" id="channel-list">
      <!-- populated by JS -->
    </div>
  </section>
</main>

<!-- Delete confirm dialog -->
<div class="overlay" id="confirm-overlay">
  <div class="dialog">
    <h3>Remove channel?</h3>
    <p id="confirm-text">This channel will be removed from Jellyfin immediately.</p>
    <div class="dialog-actions">
      <button class="btn btn-ghost" id="confirm-cancel">Cancel</button>
      <button class="btn btn-primary" id="confirm-ok" style="width:auto;background:var(--red)">Remove</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ───────────────────────────────────────────────────
const BASE   = '';
let channels = [];
let preview  = null;
let deleteTarget = null;
let previewAbort = null;

// ── DOM refs ────────────────────────────────────────────────
const urlInput      = document.getElementById('url-input');
const nameInput     = document.getElementById('name-input');
const groupInput    = document.getElementById('group-input');
const typeSelect    = document.getElementById('type-select');
const previewBtn    = document.getElementById('preview-btn');
const previewCard   = document.getElementById('preview-card');
const previewThumb  = document.getElementById('preview-thumb');
const previewPlace  = document.getElementById('preview-placeholder');
const previewTitle  = document.getElementById('preview-title');
const previewBadge  = document.getElementById('preview-badge');
const previewDur    = document.getElementById('preview-duration');
const addBtn        = document.getElementById('add-btn');
const formError     = document.getElementById('form-error');
const channelList   = document.getElementById('channel-list');
const countBadge    = document.getElementById('count-badge');
const overlay       = document.getElementById('confirm-overlay');
const confirmText   = document.getElementById('confirm-text');
const confirmOk     = document.getElementById('confirm-ok');
const confirmCancel = document.getElementById('confirm-cancel');

// ── Toast ────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = `show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 3000);
}

// ── Error display ────────────────────────────────────────────
function setError(msg) {
  formError.textContent = msg;
  formError.classList.toggle('visible', !!msg);
}

// ── Format seconds ───────────────────────────────────────────
function fmtDuration(s) {
  if (!s) return '';
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h ? `${h}h ${m}m` : `${m}m`;
}

// ── Fetch preview ────────────────────────────────────────────
async function doPreview() {
  const url = urlInput.value.trim();
  if (!url) return;
  if (previewAbort) previewAbort.abort();
  previewAbort = new AbortController();

  previewBtn.innerHTML = '<span class="spinner"></span>';
  previewBtn.disabled  = true;
  setError('');
  previewCard.classList.remove('visible');
  addBtn.disabled = true;

  try {
    const res  = await fetch(`${BASE}/api/preview`, {
      method: 'POST', signal: previewAbort.signal,
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({url})
    });
    const data = await res.json();
    if (!res.ok) { setError(data.error || 'Preview failed'); return; }

    preview = data;
    // Show card
    previewCard.classList.add('visible');
    previewTitle.textContent = data.title || url;
    if (data.thumbnail) {
      previewThumb.src     = data.thumbnail;
      previewThumb.style.display = 'block';
      previewPlace.style.display = 'none';
    } else {
      previewThumb.style.display  = 'none';
      previewPlace.style.display  = 'grid';
    }
    // Badge
    const isPlaylist = data.is_playlist;
    const isLive     = data.is_live;
    if (isLive)         { previewBadge.textContent = 'LIVE';     previewBadge.className = 'badge badge-live'; }
    else if (isPlaylist){ previewBadge.textContent = 'PLAYLIST'; previewBadge.className = 'badge badge-playlist'; }
    else                { previewBadge.textContent = 'VOD';      previewBadge.className = 'badge badge-vod'; }
    previewDur.textContent = isLive ? '' : fmtDuration(data.duration);

    // Auto-fill name
    if (!nameInput.value) nameInput.value = data.title || '';
    // Auto-select type
    if (typeSelect.value === 'auto') {
      typeSelect.value = isPlaylist ? 'playlist' : 'single';
    }
    addBtn.disabled = false;
  } catch (e) {
    if (e.name !== 'AbortError') setError('Network error — is the proxy running?');
  } finally {
    previewBtn.innerHTML = '⟳';
    previewBtn.disabled  = false;
  }
}

urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') doPreview(); });
previewBtn.addEventListener('click', doPreview);

// Enable add button if user types a name even without preview
nameInput.addEventListener('input', () => {
  if (nameInput.value.trim() && urlInput.value.trim()) addBtn.disabled = false;
});
urlInput.addEventListener('input', () => {
  preview = null;
  addBtn.disabled = true;
  previewCard.classList.remove('visible');
  setError('');
});

// ── Add channel ───────────────────────────────────────────────
addBtn.addEventListener('click', async () => {
  const url   = urlInput.value.trim();
  const name  = nameInput.value.trim();
  const group = groupInput.value.trim() || 'YouTube';
  const type  = typeSelect.value;

  if (!url)  { setError('URL is required'); return; }
  if (!name) { setError('Name is required — click ⟳ to auto-fill'); return; }

  addBtn.disabled  = true;
  addBtn.innerHTML = '<span class="spinner"></span> Adding…';
  setError('');

  const isPlaylist = type === 'playlist' ? true
                   : type === 'single'   ? false
                   : (preview?.is_playlist ?? false);

  try {
    const res  = await fetch(`${BASE}/api/channels`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({url, name, group, playlist: isPlaylist, logo: preview?.thumbnail || ''})
    });
    const data = await res.json();
    if (!res.ok) { setError(data.error || 'Failed to add channel'); return; }

    toast(`✓ "${data.name}" added — EPG loading in background`);
    // Reset form
    urlInput.value  = '';
    nameInput.value = '';
    groupInput.value= '';
    typeSelect.value= 'auto';
    preview = null;
    previewCard.classList.remove('visible');
    await loadChannels();
  } catch {
    setError('Network error');
  } finally {
    addBtn.innerHTML = '+ Add to Jellyfin';
    addBtn.disabled  = !nameInput.value.trim();
  }
});

// ── Load & render channels ────────────────────────────────────
async function loadChannels() {
  try {
    const res = await fetch(`${BASE}/api/channels`);
    channels  = await res.json();
    renderChannels();
  } catch { /* server might be starting */ }
}

function renderChannels() {
  countBadge.textContent = channels.length;
  document.getElementById('channel-count-header').textContent =
    `${channels.length} channel${channels.length !== 1 ? 's' : ''}`;

  if (!channels.length) {
    channelList.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📺</div>
        <div class="empty-text">No channels yet</div>
        <div class="empty-sub">Paste a YouTube URL and click ⟳ to add your first channel</div>
      </div>`;
    return;
  }

  channelList.innerHTML = '';
  channels.forEach(ch => {
    const epg  = ch.epg || {};
    const card = document.createElement('div');
    card.className  = 'channel-card';
    card.dataset.id = ch.id;

    const thumb = (epg.thumbnail || ch.logo)
      ? `<img class="card-thumb" src="${epg.thumbnail || ch.logo}" alt="" onerror="this.style.display='none';this.nextSibling.style.display='grid'">`
      : '';
    const thumbPlaceholder = `<div class="card-thumb-placeholder" style="${(epg.thumbnail||ch.logo)?'display:none':''}">▶</div>`;

    const epgDot  = epg.loaded
      ? `<span class="epg-status epg-loaded">◉ EPG ready</span>`
      : `<span class="epg-status epg-loading">◌ EPG loading…</span>`;

    const typeBadge = ch.playlist
      ? `<span class="badge badge-playlist">playlist</span>`
      : `<span class="badge badge-vod">stream</span>`;

    card.innerHTML = `
      ${thumb}${thumbPlaceholder}
      <div class="card-info">
        <div class="card-name" title="${ch.name}">${ch.name}</div>
        <div class="card-meta">
          <span class="card-group">${ch.group}</span>
          ${typeBadge}
          ${epgDot}
        </div>
        ${epg.title && epg.title !== ch.name
          ? `<div class="card-epg-title">▶ ${epg.title}</div>` : ''}
      </div>
      <div class="card-actions">
        <button class="btn btn-danger" data-delete="${ch.id}" data-name="${ch.name}" title="Remove channel">✕</button>
      </div>`;
    channelList.appendChild(card);
  });

  // Delete buttons
  channelList.querySelectorAll('[data-delete]').forEach(btn => {
    btn.addEventListener('click', () => confirmDelete(btn.dataset.delete, btn.dataset.name));
  });
}

// ── Delete flow ───────────────────────────────────────────────
function confirmDelete(id, name) {
  deleteTarget = id;
  confirmText.textContent = `"${name}" will be removed from Jellyfin immediately.`;
  overlay.classList.add('visible');
}

confirmCancel.addEventListener('click', () => { overlay.classList.remove('visible'); deleteTarget = null; });
overlay.addEventListener('click', e => { if (e.target === overlay) confirmCancel.click(); });

confirmOk.addEventListener('click', async () => {
  if (!deleteTarget) return;
  confirmOk.innerHTML = '<span class="spinner"></span>';
  confirmOk.disabled  = true;
  try {
    const res = await fetch(`${BASE}/api/channels/${deleteTarget}`, {method:'DELETE'});
    if (res.ok) {
      const name = channels.find(c => c.id === deleteTarget)?.name || deleteTarget;
      toast(`✓ "${name}" removed`);
      await loadChannels();
    } else {
      toast('Failed to remove channel', 'error');
    }
  } catch { toast('Network error', 'error'); }
  finally {
    confirmOk.innerHTML = 'Remove';
    confirmOk.disabled  = false;
    overlay.classList.remove('visible');
    deleteTarget = null;
  }
});

// ── Refresh EPG button ────────────────────────────────────────
document.getElementById('refresh-epg-btn').addEventListener('click', async () => {
  const btn = document.getElementById('refresh-epg-btn');
  btn.innerHTML = '<span class="spinner"></span> Refreshing…';
  btn.disabled  = true;
  await fetch(`${BASE}/epg/refresh`);
  setTimeout(async () => {
    await loadChannels();
    btn.innerHTML = '↻ Refresh EPG';
    btn.disabled  = false;
    toast('↻ EPG refresh started — titles will update shortly');
  }, 1500);
});

// ── Jellyfin link auto-detect ────────────────────────────────
const jellyfinLink = document.getElementById('jellyfin-link');
const proxyHost = window.location.hostname;
jellyfinLink.href = `http://${proxyHost}:8096`;

// ── Auto-poll EPG status ──────────────────────────────────────
async function poll() {
  await loadChannels();
  // Re-poll every 8s only while any channel has EPG loading
  const anyLoading = channels.some(c => !c.epg?.loaded);
  setTimeout(poll, anyLoading ? 8000 : 30000);
}

// ── Init ──────────────────────────────────────────────────────
poll();
</script>
